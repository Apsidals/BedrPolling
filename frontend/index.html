<!DOCTYPE html>
<html>
<head>
  <title>Bedr Polling</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>

  <div id="container">

    <h1>Bedr Polling</h1>
    <hr>

    <h2>Create a Poll</h2>
    <input id="question" placeholder="Question" />
    <br>
    <input id="options" placeholder="Options separated by commas" />
    <br>
    <button onclick="createPoll()">Create Poll</button>
    <p id="create-msg"></p>

    <hr>

    <h2>Polls</h2>
    <button onclick="loadPolls()">Refresh</button>
    <div id="polls"></div>

  </div>

  <script src="app.js"></script>

</body>
</html>
